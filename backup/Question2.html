<body>
    <div id="main">
        <h1>Quiz</h1>
        <div class="section">
            <h2>問題2</h2>
            <p>
                卵には殻が赤いものと白いものがありますが、両者の違いはなんでしょうか？
            </p>
            <h3>選択肢</h3>
            <ol class="answers" data-id="question2">
                <li data-answer="A">栄養価</li>
                <li data-answer="B">味</li>
                <li data-answer="C">賞味期限</li>
                <li data-answer="D">何も変わらない</li>
            </ol>
        </div>
        <div id="section-correct-answer" class="section">
            <h2>答え</h2>
            <p>
                <span id="correct-answer">D.何も変わらない</span><br>
                卵には殻の色は白色であれば白色レグホンのような白玉鶏、<br>
                赤色であればロードアイランドレッドなどの赤玉鶏のように<br>
                鶏の種類で決まるため、栄養価、味、賞味期限については基本的に何も変わりません。<br>
                ただし、鶏を育てる農場のこだわりによっては違いが生まれるため、<br>
                是非いろいろと食べ比べてみてはいかがでしょうか。
            </p>
        </div>
        <div class="section">
            <a href="index.html">戻る</a>
        </div>

    </div>
