<body>
    <div id="main">
        <h1>Quiz</h1>
        <div class="section">
            <h2>問題4</h2>
            <p>
                歯医者の数はあるお店より多いと言われていますが、<br>
                次のうちどのお店より多いでしょうか？
            </p>
            <h3>選択肢</h3>
            <ol class="answers" data-id="question4">
                <li data-answer="A">コンビニ</li>
                <li data-answer="B">書店</li>
                <li data-answer="C">スーパー</li>
                <li data-answer="D">ドラッグストア</li>
            </ol>
        </div>
        <div id="section-correct-answer" class="section">
            <h2>答え</h2>
            <p>
                <span id="correct-answer">A.コンビニ</span><br>
                2025年5月の時点で全国のコンビニエンスストアの数は5万6521店に対し、<br>
                歯科診療所の施設数は6万5793施設とされています。<br>
                誰もがどこに行っても見かけるコンビニエンスストアよりも歯医者さんの方が多いという事実は衝撃ですよね。
            </p>
        </div>

        </div>
    </div>
