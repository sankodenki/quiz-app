<!DOCTYPE html>

<body>
    <div id="main">
        <h1>Quiz</h1>
        <div class="section">
            <h2>問題3</h2>
            <p>
                1円玉をつくるのにかかる費用はいくらでしょうか？
            </p>
            <h3>選択肢</h3>
            <ol class="answers" data-id="question3">
                <li data-answer="A">0.3円</li>
                <li data-answer="B">0.6円</li>
                <li data-answer="C">1円</li>
                <li data-answer="D">3円</li>
            </ol>
        </div>
        <div id="section-correct-answer" class="section">
            <h2>答え</h2>
            <p>
                <span id="correct-answer">D.3円</span><br>
                1円玉はアルミニウムを材料に作られている硬貨です。<br>
                1枚に必要な材料費の原価は0.3円程度ですが、加工する費用などを合算すると3円になってしまいます。<br>
                ちなみに5円玉は1枚10円、10円玉は13円の費用がかかり、50円玉になってやっと12円になるそうです。
            </p>
        </div>
        <div class="section">
            <a href="index.html">戻る</a>
        </div>
    </div>
</body>
</html>
