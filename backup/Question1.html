<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="Questions.js" defer></script>
    <title>問題1 | Quiz</title>
</head>
<body>
    <div id="main">
        <h1>Quiz</h1>
        <div class="section">
            <h2>問題1</h2>
            <p>
                髪の毛は1年間でどれだけ伸びるでしょうか？
            </p>
            <h3>選択肢</h3>
            <ol class="answers" data-id="question1">
                <li data-answer="A">6cm</li>
                <li data-answer="B">8cm</li>
                <li data-answer="C">12cm</li>
                <li data-answer="D">20cm</li>
            </ol>
        </div>
        <div id="section-correct-answer" class="section">
            <h2>答え</h2>
            <p>
                <span id="correct-answer">C.12cm</span><br>
                髪の毛は1日で0.3～0.4mmほど伸びると言われており、<br>
                そこから平均すると1週間で2.5mm、1ヵ月で約1cm、1年で約12cmほどになる計算です。<br>
                髪の毛は全体で約10万本生えており9割が成長期であることから、<br>
                その長さを合計すると1年間で約100kmになると言われています。<br>
                髪の毛が体の中でもとくに新陳代謝が活発なのがわかりますよね。<br>
            </p>
        </div>
        <div class="section">
            <a href="index.html">戻る</a>
        </div>

    </div>
</body>
</html>
